<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force Reload - Skoolific</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin: 15px 0;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            padding: 15px 40px;
            margin: 20px 10px;
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            background: #28a745;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .button.secondary {
            background: #007bff;
        }
        .steps {
            text-align: left;
            margin: 30px auto;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
        }
        .steps li {
            margin: 10px 0;
            font-size: 1.1em;
        }
        .success {
            color: #90EE90;
            font-weight: bold;
            font-size: 1.3em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Clear Cache & Reload</h1>
        <p>Your browser is loading old cached files. Follow these steps to fix it:</p>
        
        <div class="steps">
            <ol>
                <li><strong>Windows:</strong> Press <code>Ctrl + Shift + R</code> or <code>Ctrl + F5</code></li>
                <li><strong>Mac:</strong> Press <code>Cmd + Shift + R</code></li>
                <li><strong>Or:</strong> Click the button below to clear cache automatically</li>
            </ol>
        </div>

        <button class="button" onclick="clearCacheAndReload()">🗑️ Clear Cache & Reload</button>
        <a href="/" class="button secondary">🏠 Go to Home</a>

        <div id="status"></div>
    </div>

    <script>
        async function clearCacheAndReload() {
            const status = document.getElementById('status');
            status.innerHTML = '<p>Clearing cache...</p>';

            try {
                // Clear all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(
                        cacheNames.map(cacheName => caches.delete(cacheName))
                    );
                    console.log('✅ All caches cleared');
                }

                // Unregister service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(
                        registrations.map(registration => registration.unregister())
                    );
                    console.log('✅ Service workers unregistered');
                }

                // Clear localStorage and sessionStorage
                localStorage.clear();
                sessionStorage.clear();
                console.log('✅ Storage cleared');

                status.innerHTML = '<p class="success">✅ Cache cleared successfully!</p><p>Reloading in 2 seconds...</p>';

                // Reload with cache bypass
                setTimeout(() => {
                    window.location.href = '/?nocache=' + Date.now();
                }, 2000);

            } catch (error) {
                console.error('Error clearing cache:', error);
                status.innerHTML = '<p style="color: #ff6b6b;">❌ Error: ' + error.message + '</p><p>Please try manual refresh: Ctrl+Shift+R</p>';
            }
        }

        // Auto-clear on load if requested
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('auto') === 'true') {
            clearCacheAndReload();
        }
    </script>
</body>
</html>
