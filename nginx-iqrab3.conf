server {
    listen 80;
    listen [::]:80;
    server_name iqrab3.skoolific.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name iqrab3.skoolific.com;

    ssl_certificate /etc/letsencrypt/live/iqrab3.skoolific.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iqrab3.skoolific.com/privkey.pem;
    
    root /var/www/iqrab3.skoolific.com;
    index index.html;

    # Proper MIME types for assets
    location ~* \.(css|js|json|woff|woff2|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
        types {
            text/css css;
            application/javascript js;
            application/json json;
            font/woff woff;
            font/woff2 woff2;
            font/ttf ttf;
            image/svg+xml svg;
            image/png png;
            image/jpeg jpg jpeg;
            image/gif gif;
            image/x-icon ico;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /var/www/skoolific/iqrab3/backend/uploads/;
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=31536000";
        autoindex off;
    }

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
}
